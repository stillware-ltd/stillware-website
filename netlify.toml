[build]
  command = "npm run build"
  publish = "dist"

[context.production]
  environment = { NODE_VERSION = "20" }

# License API — proxy clean URLs to Netlify Functions
[[redirects]]
  from = "/webhooks/paddle"
  to = "/.netlify/functions/paddle-webhook"
  status = 200

[[redirects]]
  from = "/api/licenses/activate"
  to = "/.netlify/functions/license-activate"
  status = 200

[[redirects]]
  from = "/api/licenses/deactivate"
  to = "/.netlify/functions/license-deactivate"
  status = 200

[[redirects]]
  from = "/api/licenses/validate"
  to = "/.netlify/functions/license-validate"
  status = 200

# Legacy redirects for old /zeroed/ paths
[[redirects]]
  from = "/zeroed/privacy"
  to = "/privacy"
  status = 301

[[redirects]]
  from = "/zeroed/terms"
  to = "/terms"
  status = 301

[[redirects]]
  from = "/zeroed/delete-account"
  to = "/delete-account"
  status = 301

[[redirects]]
  from = "/zeroed/"
  to = "/zeroed"
  status = 301

# Form notifications — sends all form submissions to support email
# Configure in Netlify Dashboard: Site settings > Forms > Form notifications
# Add "Email notification" for each form, recipient: support@stillwareltd.com
# Forms: newsletter, notify-estate-keep, notify-fort-knox,
#         notify-estate-keep-apps, notify-fort-knox-apps

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Content-Type = "image/svg+xml"
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/blog/images/**/*.svg"
  [headers.values]
    Content-Type = "image/svg+xml"
    Cache-Control = "public, max-age=2592000"
