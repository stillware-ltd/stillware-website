<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <style>
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
  </style>

  <rect width="1200" height="675" fill="#fffbeb"/>

  <!-- Background pattern (per-article variation) -->
  <rect width="1200" height="6" fill="#2563eb"/><rect y="6" width="1200" height="2" fill="#60a5fa" opacity="0.4"/>

  <!-- Subtle top accent bar -->
  <rect width="1200" height="4" fill="#2563eb"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" font-size="28" font-weight="700" fill="#1e293b">5-year cost comparison: Subscription vs. One-Time Purchase</text>

  <!-- Chart area -->
  
  
  
  
  
  
  

  <!-- Y axis -->
  <line x1="240" y1="85" x2="240" y2="610" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Gridlines -->
  
  
  <line x1="396" y1="85" x2="396" y2="610" stroke="#f1f5f9" stroke-width="1"/>
  
  
  <line x1="552" y1="85" x2="552" y2="610" stroke="#f1f5f9" stroke-width="1"/>
  
  
  <line x1="708" y1="85" x2="708" y2="610" stroke="#f1f5f9" stroke-width="1"/>
  
  
  <line x1="864" y1="85" x2="864" y2="610" stroke="#f1f5f9" stroke-width="1"/>
  
  
  <line x1="1020" y1="85" x2="1020" y2="610" stroke="#f1f5f9" stroke-width="1"/>
  

  
  
  
  

  <!-- Label -->
  <text x="226" y="221" text-anchor="end" font-size="14" font-weight="500" fill="#1e293b">Subscription Model</text>

  <!-- Bar with rounded right end -->
  <rect x="245" y="93" width="780" height="246" rx="18" fill="#dc2626" opacity="0.85"/>
  <rect x="245" y="93" width="780" height="246" rx="18" fill="#dc2626" opacity="0.12"/>

  <!-- Value label -->
  <text x="1036" y="221" font-size="14" font-weight="700" fill="#dc2626">$299.40</text>
  
  
  
  

  <!-- Label -->
  <text x="226" y="483" text-anchor="end" font-size="14" font-weight="500" fill="#1e293b">One-Time Purchase</text>

  <!-- Bar with rounded right end -->
  <rect x="245" y="355" width="26" height="246" rx="18" fill="#f59e0b" opacity="0.85"/>
  <rect x="245" y="355" width="26" height="246" rx="18" fill="#f59e0b" opacity="0.12"/>

  <!-- Value label -->
  <text x="282" y="483" font-size="14" font-weight="700" fill="#f59e0b">$9.99</text>
  

  <!-- Source attribution -->
  <text x="1190" y="665" text-anchor="end" font-size="10" fill="#cbd5e1">stillwareltd.com</text>
</svg>