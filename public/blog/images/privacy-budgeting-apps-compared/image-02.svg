<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <style>
    :root { --accent: #2563eb; --accent-light: #dbeafe; --text: #1e293b; --muted: #64748b; --bg: #ffffff; }
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: var(--text); }
    .step-num { font-size: 22px; font-weight: 700; fill: var(--bg); }
    .step-label { font-size: 16px; font-weight: 600; fill: var(--text); }
    .step-desc { font-size: 13px; fill: var(--muted); }
  </style>

  <rect width="1200" height="675" fill="var(--bg)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" class="title">The Data Journey: Cloud-Based vs. Local-First Budgeting</text>

  
  
  
  
  

  
  
  

  <!-- Step circle -->
  <circle cx="600" cy="150" r="30" fill="var(--accent)"/>
  <text x="600" y="158" text-anchor="middle" class="step-num">1</text>

  <!-- Step box -->
  <rect x="520" y="200" width="160" height="120" rx="8" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
  <text x="600" y="235" text-anchor="middle" class="step-label">Cloud-Based:Device -> Aggregator API -> App Servers -> Device; Local-First:Device -> (Optional User Cloud) -> Device; Manual Import:Bank CSV/PDF -> Device</text>

  <!-- Description (wrapped manually — SVG has no auto-wrap) -->
  <foreignObject x="530" y="245" width="140" height="65">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:12px;color:#64748b;margin:0;line-height:1.3;"></p>
  </foreignObject>

  <!-- Arrow to next step -->
  
  
</svg>