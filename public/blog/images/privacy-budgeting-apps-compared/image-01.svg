<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <style>
    :root { --accent: #2563eb; --accent-light: #dbeafe; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; --bg: #ffffff; }
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: var(--text); }
    .header { font-size: 18px; font-weight: 600; fill: var(--bg); }
    .label { font-size: 15px; font-weight: 500; fill: var(--text); }
    .value { font-size: 15px; fill: var(--muted); }
  </style>

  <rect width="1200" height="675" fill="var(--bg)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" class="title">Core Data Architecture Comparison of Privacy-First Budgeting Apps</text>

  <!-- Table -->
  
  
  

  
  

  <!-- Column header -->
  <rect x="100" y="80" width="250" height="45" fill="var(--accent)" rx="8 0 0 0"/>
  <text x="225" y="108" text-anchor="middle" class="header">App</text>

  <!-- Rows -->
  
  
  <rect x="100" y="135" width="250" height="55" fill="var(--accent-light)" stroke="var(--border)" stroke-width="1"/>
  <text x="115" y="158" class="label">App</text>
  <text x="115" y="178" class="value">Zeroed</text>
  
  
  <rect x="100" y="195" width="250" height="55" fill="var(--bg)" stroke="var(--border)" stroke-width="1"/>
  <text x="115" y="218" class="label">Data Location</text>
  <text x="115" y="238" class="value">User's Device & User's Google Drive</text>
  
  
  <rect x="100" y="255" width="250" height="55" fill="var(--accent-light)" stroke="var(--border)" stroke-width="1"/>
  <text x="115" y="278" class="label">Encryption Keys</text>
  <text x="115" y="298" class="value">User-Held</text>
  
  
  <rect x="100" y="315" width="250" height="55" fill="var(--bg)" stroke="var(--border)" stroke-width="1"/>
  <text x="115" y="338" class="label">Bank Sync</text>
  <text x="115" y="358" class="value">Optional CSV/PDF</text>
  
  
  

  <!-- Column header -->
  <rect x="350" y="80" width="250" height="45" fill="var(--accent)" rx="0"/>
