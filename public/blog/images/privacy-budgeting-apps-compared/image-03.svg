<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <style>
    :root { --accent: #2563eb; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; --bg: #ffffff; }
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: var(--text); }
    .bar-label { font-size: 14px; fill: var(--text); font-weight: 500; }
    .bar-value { font-size: 14px; fill: var(--muted); font-weight: 600; }
    .axis { stroke: var(--border); stroke-width: 1; }
  </style>

  <rect width="1200" height="675" fill="var(--bg)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" class="title">5-Year Total Cost of Ownership Comparison</text>

