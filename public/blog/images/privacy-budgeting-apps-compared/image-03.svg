  <!-- Bar -->
  <rect x="205" y="100" width="0" height="91" rx="4" fill="#2563eb"/>

  <!-- Value -->
  <text x="215" y="150" class="bar-value">0</text>
  
  
  

  <!-- Label -->
  <text x="190" y="256" text-anchor="end" class="bar-label">Cost</text>

