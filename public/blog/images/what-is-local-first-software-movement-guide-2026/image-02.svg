<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <style>
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
  </style>

  <rect width="1200" height="675" fill="#ffffff"/>

  <!-- Background pattern (per-article variation) -->
  <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="1" fill="#7c3aed" opacity="0.06"/></pattern><rect width="1200" height="675" fill="url(#dots)"/>

  <!-- Subtle top accent bar -->
  <rect width="1200" height="4" fill="#059669"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" font-size="26" font-weight="700" fill="#1e293b">Five-year total cost of ownership for budgeting apps</text>

  <!-- Chart area -->
  
  
  
  
  
  
  

  <!-- Y axis -->
  <line x1="240" y1="85" x2="240" y2="610" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Gridlines -->
  
  
  <line x1="396" y1="85" x2="396" y2="610" stroke="#f1f5f9" stroke-width="1"/>
  
  
  <line x1="552" y1="85" x2="552" y2="610" stroke="#f1f5f9" stroke-width="1"/>
  
  
  <line x1="708" y1="85" x2="708" y2="610" stroke="#f1f5f9" stroke-width="1"/>
  
  
  <line x1="864" y1="85" x2="864" y2="610" stroke="#f1f5f9" stroke-width="1"/>
  
  
  <line x1="1020" y1="85" x2="1020" y2="610" stroke="#f1f5f9" stroke-width="1"/>
  

  
  
  
  

  <!-- Label -->
  <text x="226" y="221" text-anchor="end" font-size="13" font-weight="500" fill="#1e293b">Subscription App (at $14.99/month)</text>

  <!-- Bar with rounded right end -->
  <rect x="245" y="93" width="780" height="246" rx="12" fill="#7c3aed" opacity="0.85"/>
  <rect x="245" y="93" width="780" height="246" rx="12" fill="#7c3aed" opacity="0.12"/>

  <!-- Value label -->
  <text x="1036" y="221" font-size="13" font-weight="700" fill="#7c3aed">$899.40</text>
  
  
  
  

  <!-- Label -->
  <text x="226" y="483" text-anchor="end" font-size="13" font-weight="500" fill="#1e293b">Zeroed (one-time purchase)</text>

  <!-- Bar with rounded right end -->
  <rect x="245" y="355" width="34" height="246" rx="12" fill="#a78bfa" opacity="0.85"/>
  <rect x="245" y="355" width="34" height="246" rx="12" fill="#a78bfa" opacity="0.12"/>

  <!-- Value label -->
  <text x="290" y="483" font-size="13" font-weight="700" fill="#a78bfa">$39.99</text>
  

  <!-- Source attribution -->
  <text x="1190" y="665" text-anchor="end" font-size="10" fill="#cbd5e1">stillwareltd.com</text>
</svg>