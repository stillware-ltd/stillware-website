<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <style>
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
  </style>

  <rect width="1200" height="675" fill="#faf5ff"/>

  <!-- Background pattern (per-article variation) -->
  

  <!-- Subtle top accent bar -->
  <rect width="1200" height="4" fill="#059669"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#1e293b">A diagram showing data flow: free tools send info to a server, while offline tools keep everything on your device.</text>

  <!-- Divider -->
  <line x1="600" y1="80" x2="600" y2="635" stroke="#059669" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- VS badge -->
  <circle cx="600" cy="110" r="22" fill="#059669"/>
  <text x="600" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">VS</text>

  <!-- Before panel -->
  <rect x="40" y="80" width="520" height="555" rx="10" fill="#dc2626" opacity="0.06"/>
  <rect x="40" y="80" width="520" height="555" rx="10" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.4"/>
  <text x="290" y="120" text-anchor="middle" font-size="20" font-weight="700" fill="#dc2626">Free Online Tool</text>

  
  
  <circle cx="78" cy="156" r="6" fill="#dc2626" opacity="0.6"/>
  <foreignObject x="96" y="142" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">Your Data Entry:Client name</p>
  </foreignObject>
  
  
  <circle cx="78" cy="212" r="6" fill="#dc2626" opacity="0.6"/>
  <foreignObject x="96" y="198" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">service</p>
  </foreignObject>
  
  
  <circle cx="78" cy="268" r="6" fill="#dc2626" opacity="0.6"/>
  <foreignObject x="96" y="254" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">price</p>
  </foreignObject>
  
  
  <circle cx="78" cy="324" r="6" fill="#dc2626" opacity="0.6"/>
  <foreignObject x="96" y="310" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">Transmitted to Server:Stored and analyzed by the company</p>
  </foreignObject>
  
  
  <circle cx="78" cy="380" r="6" fill="#dc2626" opacity="0.6"/>
  <foreignObject x="96" y="366" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">Monetized:Data used for ads or sold to third parties</p>
  </foreignObject>
  
  
  <circle cx="78" cy="436" r="6" fill="#dc2626" opacity="0.6"/>
  <foreignObject x="96" y="422" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">You Access:View your data through their portal</p>
  </foreignObject>
  

  <!-- After panel -->
  <rect x="640" y="80" width="520" height="555" rx="10" fill="#16a34a" opacity="0.06"/>
  <rect x="640" y="80" width="520" height="555" rx="10" fill="none" stroke="#16a34a" stroke-width="1.5" opacity="0.4"/>
  <text x="900" y="120" text-anchor="middle" font-size="20" font-weight="700" fill="#16a34a">Local-First Tool</text>

  
  
