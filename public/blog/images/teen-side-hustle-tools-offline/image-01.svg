  <foreignObject x="696" y="142" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">Your Data Entry:Client name</p>
  </foreignObject>
  
  
  <circle cx="678" cy="212" r="6" fill="#16a34a" opacity="0.6"/>
  <foreignObject x="696" y="198" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">service</p>
  </foreignObject>
  
  
  <circle cx="678" cy="268" r="6" fill="#16a34a" opacity="0.6"/>
  <foreignObject x="696" y="254" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">price</p>
  </foreignObject>
  
  
  <circle cx="678" cy="324" r="6" fill="#16a34a" opacity="0.6"/>
  <foreignObject x="696" y="310" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">Stored On Device:Encrypted and never leaves your phone</p>
  </foreignObject>
  
  
  <circle cx="678" cy="380" r="6" fill="#16a34a" opacity="0.6"/>
  <foreignObject x="696" y="366" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">You Control:Full ownership</p>
  </foreignObject>
  
  
  <circle cx="678" cy="436" r="6" fill="#16a34a" opacity="0.6"/>
  <foreignObject x="696" y="422" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">no external access</p>
  </foreignObject>
  
  
  <circle cx="678" cy="492" r="6" fill="#16a34a" opacity="0.6"/>
  <foreignObject x="696" y="478" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">You Access:Data is instantly available</p>
