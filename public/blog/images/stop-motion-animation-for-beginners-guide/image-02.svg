  <rect x="720" y="200" width="160" height="130" rx="10" fill="#f0f5ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="800" y="235" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Export:1min</text>

  <!-- Description -->
