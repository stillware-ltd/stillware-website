  </foreignObject>
  
  
  
  

  <!-- Dot -->
  <circle cx="355" cy="330" r="10" fill="#fffbeb" stroke="#34d399" stroke-width="3"/>
  <circle cx="355" cy="330" r="4" fill="#34d399"/>

