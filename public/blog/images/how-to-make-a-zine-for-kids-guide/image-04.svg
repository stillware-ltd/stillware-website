<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <style>
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
  </style>

  <rect width="1200" height="675" fill="#fffbeb"/>

  <!-- Background pattern (per-article variation) -->
  

  <!-- Subtle top accent bar -->
  <rect width="1200" height="4" fill="#e11d48"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#1e293b">The journey from idea to shared publication</text>

  
  
  
  

  <!-- Dot accent colors (theme-aware) -->
  

  <!-- Horizontal timeline line -->
  <line x1="95" y1="330" x2="1105" y2="330" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round"/>
  <!-- Colored overlay on the line -->
  <line x1="95" y1="330" x2="1105" y2="330" stroke="#e11d48" stroke-width="3" stroke-linecap="round" opacity="0.25"/>

  
  
  
  

  <!-- Dot -->
  <circle cx="110" cy="330" r="10" fill="#fffbeb" stroke="#e11d48" stroke-width="3"/>
  <circle cx="110" cy="330" r="4" fill="#e11d48"/>

  <!-- Vertical connector -->
  
  <line x1="110" y1="320" x2="110" y2="280" stroke="#e2e8f0" stroke-width="1.5"/>
  

  <!-- Event card -->
  
  
  

  <rect x="30" y="120" width="160" height="155" rx="18" fill="#fef3c7" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="30" y="120" width="160" height="4" rx="2" fill="#e11d48"/>
  <text x="110" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#e11d48">Day 1</text>
  <text x="110" y="168" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Brainstorm &amp; Fold</text>

