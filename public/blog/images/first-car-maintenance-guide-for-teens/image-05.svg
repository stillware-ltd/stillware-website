  <rect x="245" y="93" width="780" height="115" rx="10" fill="#059669" opacity="0.85"/>
  <rect x="245" y="93" width="780" height="115" rx="10" fill="#059669" opacity="0.12"/>

  <!-- Value label -->
  <text x="1036" y="155" font-size="13" font-weight="700" fill="#059669">29.5</text>
  
  
  
  

  <!-- Label -->
  <text x="226" y="286" text-anchor="end" font-size="13" font-weight="500" fill="#1e293b">Winter Blend Fuel</text>

  <!-- Bar with rounded right end -->
  <rect x="245" y="224" width="742" height="115" rx="10" fill="#dc2626" opacity="0.85"/>
  <rect x="245" y="224" width="742" height="115" rx="10" fill="#dc2626" opacity="0.12"/>

  <!-- Value label -->
  <text x="998" y="286" font-size="13" font-weight="700" fill="#dc2626">28.1</text>
  
  
  
  

  <!-- Label -->
  <text x="226" y="417" text-anchor="end" font-size="13" font-weight="500" fill="#1e293b">Under-Inflated Tires</text>

  <!-- Bar with rounded right end -->
  <rect x="245" y="355" width="682" height="115" rx="10" fill="#f59e0b" opacity="0.85"/>
  <rect x="245" y="355" width="682" height="115" rx="10" fill="#f59e0b" opacity="0.12"/>

