  <text x="290" y="120" text-anchor="middle" font-size="20" font-weight="700" fill="#dc2626">Typical &#34;Kids&#34; Chess App</text>

  
  
  <circle cx="78" cy="156" r="6" fill="#dc2626" opacity="0.6"/>
  <foreignObject x="96" y="142" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#1e293b;margin:0;line-height:1.45;">Requires constant internet</p>
  </foreignObject>
  
  
