  <circle cx="678" cy="268" r="6" fill="#16a34a" opacity="0.6"/>
  <foreignObject x="696" y="254" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#1e293b;margin:0;line-height:1.45;">One-time purchase</p>
  </foreignObject>
  
  
