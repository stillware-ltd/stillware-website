<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <style>
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
  </style>

  <rect width="1200" height="675" fill="#f0fdf4"/>

  <!-- Background pattern (per-article variation) -->
  <rect width="1200" height="6" fill="#e11d48"/><rect y="6" width="1200" height="2" fill="#fb7185" opacity="0.4"/>

  <!-- Subtle top accent bar -->
  <rect width="1200" height="4" fill="#92400e"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#1e293b">File format survivability over decades</text>

  
  
  
  

  <!-- Dot accent colors (theme-aware) -->
  

  <!-- Horizontal timeline line -->
  <line x1="95" y1="330" x2="1105" y2="330" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round"/>
  <!-- Colored overlay on the line -->
  <line x1="95" y1="330" x2="1105" y2="330" stroke="#92400e" stroke-width="3" stroke-linecap="round" opacity="0.25"/>

  
  
  
  

  <!-- Dot -->
  <circle cx="600" cy="330" r="10" fill="#f0fdf4" stroke="#92400e" stroke-width="3"/>
  <circle cx="600" cy="330" r="4" fill="#92400e"/>

  <!-- Vertical connector -->
  
  <line x1="600" y1="320" x2="600" y2="280" stroke="#e2e8f0" stroke-width="1.5"/>
  

  <!-- Event card -->
  
  
  

  <rect x="520" y="120" width="160" height="155" rx="14" fill="#ecfdf5" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="520" y="120" width="160" height="4" rx="2" fill="#92400e"/>
  <text x="600" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">1990</text>
  <text x="600" y="168" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">JPEG</text>

  <foreignObject x="530" y="176" width="140" height="85">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:11px;color:#64748b;margin:0;line-height:1.35;text-align:center;">Still supported in 2025;1993:WordPerfect:Effectively dead;2000:MP3:Supported eve</p>
  </foreignObject>
  

  <!-- Source attribution -->
  <text x="1190" y="665" text-anchor="end" font-size="10" fill="#cbd5e1">stillwareltd.com</text>
