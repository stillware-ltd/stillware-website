<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <style>
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
  </style>

  <rect width="1200" height="675" fill="#fffbeb"/>

  <!-- Background pattern (per-article variation) -->
  <rect width="1200" height="6" fill="#059669"/><rect y="6" width="1200" height="2" fill="#34d399" opacity="0.4"/>

  <!-- Subtle top accent bar -->
  <rect width="1200" height="4" fill="#e11d48"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#1e293b">The journey from blank grid to usable game asset</text>

  <!-- Divider -->
  <line x1="600" y1="80" x2="600" y2="635" stroke="#e11d48" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- VS badge -->
  <circle cx="600" cy="110" r="22" fill="#e11d48"/>
  <text x="600" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">VS</text>

  <!-- Before panel -->
  <rect x="40" y="80" width="520" height="555" rx="18" fill="#dc2626" opacity="0.06"/>
  <rect x="40" y="80" width="520" height="555" rx="18" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.4"/>
  <text x="290" y="120" text-anchor="middle" font-size="20" font-weight="700" fill="#dc2626">Blank 16x16 Grid</text>

  
  
  <circle cx="78" cy="156" r="6" fill="#dc2626" opacity="0.6"/>
  <foreignObject x="96" y="142" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#1e293b;margin:0;line-height:1.45;">Empty gray squares</p>
  </foreignObject>
  
  
  <circle cx="78" cy="212" r="6" fill="#dc2626" opacity="0.6"/>
  <foreignObject x="96" y="198" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#1e293b;margin:0;line-height:1.45;">A theoretical idea</p>
  </foreignObject>
  
  
  <circle cx="78" cy="268" r="6" fill="#dc2626" opacity="0.6"/>
  <foreignObject x="96" y="254" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#1e293b;margin:0;line-height:1.45;">No tangible output</p>
  </foreignObject>
  

  <!-- After panel -->
  <rect x="640" y="80" width="520" height="555" rx="18" fill="#16a34a" opacity="0.06"/>
  <rect x="640" y="80" width="520" height="555" rx="18" fill="none" stroke="#16a34a" stroke-width="1.5" opacity="0.4"/>
  <text x="900" y="120" text-anchor="middle" font-size="20" font-weight="700" fill="#16a34a">Finished Mushroom Sprite</text>

  
  
  <circle cx="678" cy="156" r="6" fill="#16a34a" opacity="0.6"/>
  <foreignObject x="696" y="142" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#1e293b;margin:0;line-height:1.45;">Vibrant red with white spots</p>
  </foreignObject>
  
  
  <circle cx="678" cy="212" r="6" fill="#16a34a" opacity="0.6"/>
  <foreignObject x="696" y="198" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#1e293b;margin:0;line-height:1.45;">A PNG file in your folder</p>
  </foreignObject>
  
  
  <circle cx="678" cy="268" r="6" fill="#16a34a" opacity="0.6"/>
  <foreignObject x="696" y="254" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#1e293b;margin:0;line-height:1.45;">Ready for game engines or print</p>
  </foreignObject>
  

  <!-- Source attribution -->
  <text x="1190" y="665" text-anchor="end" font-size="10" fill="#cbd5e1">stillwareltd.com</text>
</svg>