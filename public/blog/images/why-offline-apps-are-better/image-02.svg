<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <style>
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
  </style>

  <rect width="1200" height="675" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#1e293b">Five-Year Total Cost: Subscription vs. One-Time Purchase</text>

  <!-- Chart area -->
  
  
  
  
  
  
  

  <!-- Y axis -->
  <line x1="220" y1="90" x2="220" y2="620" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Gridlines -->
  
  
  <line x1="380" y1="90" x2="380" y2="620" stroke="#f1f5f9" stroke-width="1"/>
  
  
  <line x1="540" y1="90" x2="540" y2="620" stroke="#f1f5f9" stroke-width="1"/>
  
  
  <line x1="700" y1="90" x2="700" y2="620" stroke="#f1f5f9" stroke-width="1"/>
  
  
  <line x1="860" y1="90" x2="860" y2="620" stroke="#f1f5f9" stroke-width="1"/>
  
  
  <line x1="1020" y1="90" x2="1020" y2="620" stroke="#f1f5f9" stroke-width="1"/>
  

  
  
  

  <!-- Label -->
  <text x="208" y="184" text-anchor="end" font-size="14" font-weight="500" fill="#1e293b">App A (Subscription)</text>

  <!-- Bar with rounded right end -->
  <rect x="225" y="100" width="800" height="158" rx="6" fill="#ef4444" opacity="0.85"/>
  <rect x="225" y="100" width="800" height="158" rx="6" fill="#ef4444" opacity="0.15"/>

  <!-- Value -->
  <text x="1036" y="184" font-size="14" font-weight="600" fill="#64748b">600</text>
  
  
  

  <!-- Label -->
  <text x="208" y="360" text-anchor="end" font-size="14" font-weight="500" fill="#1e293b">App B (Subscription)</text>

  <!-- Bar with rounded right end -->
  <rect x="225" y="276" width="600" height="158" rx="6" fill="#f97316" opacity="0.85"/>
  <rect x="225" y="276" width="600" height="158" rx="6" fill="#f97316" opacity="0.15"/>

  <!-- Value -->
  <text x="836" y="360" font-size="14" font-weight="600" fill="#64748b">450</text>
  
  
  

  <!-- Label -->
  <text x="208" y="536" text-anchor="end" font-size="14" font-weight="500" fill="#1e293b">Zeroed (One-Time)</text>

  <!-- Bar with rounded right end -->
  <rect x="225" y="452" width="53" height="158" rx="6" fill="#2563eb" opacity="0.85"/>
  <rect x="225" y="452" width="53" height="158" rx="6" fill="#2563eb" opacity="0.15"/>

  <!-- Value -->
  <text x="289" y="536" font-size="14" font-weight="600" fill="#64748b">39.99</text>
  
</svg>