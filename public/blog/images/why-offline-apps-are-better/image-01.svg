<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <style>
    :root { --accent: #2563eb; --accent-light: #dbeafe; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; --bg: #ffffff; }
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
    .title { font-size: 28px; font-weight: 700; fill: var(--text); }
    .box-label { font-size: 16px; font-weight: 600; fill: var(--text); }
    .box-desc { font-size: 12px; fill: var(--muted); }
    .connector { stroke: var(--accent); stroke-width: 2; fill: none; stroke-dasharray: 6,3; }
  </style>

  <rect width="1200" height="675" fill="var(--bg)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" class="title">Data flow comparison: Cloud-First vs. Offline-First architecture</text>

  <!-- Boxes arranged in a grid (2 rows, up to 4 columns) -->
  
  
  
  
  
  
  

  
  
  
  
  

  <rect x="490" y="90" width="220" height="120" rx="10" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
  <text x="600" y="125" text-anchor="middle" class="box-label">Cloud-First</text>

  <foreignObject x="502" y="135" width="196" height="65">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:12px;color:#64748b;margin:0;line-height:1.3;text-align:center;">Your Device -> Company Server -> Their Analytics -> Your Device; Offline-First:Your Device -> Your Local Storage -> (Optional) Your Cloud Drive -> Your Device</p>
  </foreignObject>
  

  <!-- Connections (dashed lines between box centers) -->
  
</svg>