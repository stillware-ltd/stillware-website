<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <style>
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
  </style>

  <rect width="1200" height="675" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#1e293b">Data Flow: Cloud-First vs. Offline-First Architecture</text>

  <!-- Boxes arranged in a grid (2 rows, up to 4 columns) -->
  
  
  
  
  
  
  

  
  
  
  
  

  <rect x="86" y="90" width="230" height="130" rx="12" fill="#f0f5ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="86" y="90" width="230" height="4" rx="2" fill="#2563eb"/>
  <text x="201" y="128" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Your Device</text>

  <foreignObject x="100" y="138" width="202" height="72">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:12px;color:#64748b;margin:0;line-height:1.35;text-align:center;">Where you enter and view your budget data</p>
  </foreignObject>
  
  
  
  
  

  <rect x="352" y="90" width="230" height="130" rx="12" fill="#f0f5ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="352" y="90" width="230" height="4" rx="2" fill="#2563eb"/>
  <text x="467" y="128" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Company Server</text>

  <foreignObject x="366" y="138" width="202" height="72">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:12px;color:#64748b;margin:0;line-height:1.35;text-align:center;">Cloud-first: data lives on their infrastructure</p>
  </foreignObject>
  
  
  
  
  

  <rect x="618" y="90" width="230" height="130" rx="12" fill="#f0f5ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="618" y="90" width="230" height="4" rx="2" fill="#2563eb"/>
  <text x="733" y="128" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Their Analytics</text>

  <foreignObject x="632" y="138" width="202" height="72">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:12px;color:#64748b;margin:0;line-height:1.35;text-align:center;">Usage data, telemetry, behavior tracking</p>
  </foreignObject>
  
  
  
  
  

  <rect x="884" y="90" width="230" height="130" rx="12" fill="#f0f5ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="884" y="90" width="230" height="4" rx="2" fill="#2563eb"/>
  <text x="999" y="128" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Third-Party APIs</text>

  <foreignObject x="898" y="138" width="202" height="72">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:12px;color:#64748b;margin:0;line-height:1.35;text-align:center;">Plaid, Yodlee aggregators with bank access</p>
  </foreignObject>
  
  
  
  
  

  <rect x="86" y="280" width="230" height="130" rx="12" fill="#f0f5ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="86" y="280" width="230" height="4" rx="2" fill="#2563eb"/>
  <text x="201" y="318" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Your Device</text>

  <foreignObject x="100" y="328" width="202" height="72">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:12px;color:#64748b;margin:0;line-height:1.35;text-align:center;">Offline-first: data stays here, encrypted locally</p>
  </foreignObject>
  
  
  
  
  

  <rect x="352" y="280" width="230" height="130" rx="12" fill="#f0f5ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="352" y="280" width="230" height="4" rx="2" fill="#2563eb"/>
  <text x="467" y="318" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Your Cloud Drive</text>

  <foreignObject x="366" y="328" width="202" height="72">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:12px;color:#64748b;margin:0;line-height:1.35;text-align:center;">Optional: Google Drive/iCloud for encrypted sync</p>
  </foreignObject>
  
  
  
  
  

  <rect x="618" y="280" width="230" height="130" rx="12" fill="#f0f5ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="618" y="280" width="230" height="4" rx="2" fill="#2563eb"/>
  <text x="733" y="318" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Your Other Devices</text>

  <foreignObject x="632" y="328" width="202" height="72">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:12px;color:#64748b;margin:0;line-height:1.35;text-align:center;">Decrypt locally with your key, no middleman</p>
  </foreignObject>
  
  
  
  
  

  <rect x="884" y="280" width="230" height="130" rx="12" fill="#f0f5ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="884" y="280" width="230" height="4" rx="2" fill="#2563eb"/>
  <text x="999" y="318" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">No Server Needed</text>

  <foreignObject x="898" y="328" width="202" height="72">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:12px;color:#64748b;margin:0;line-height:1.35;text-align:center;">Zero-knowledge: company never sees your data</p>
  </foreignObject>
  

  <!-- Connections (dashed lines between box centers) -->
  
  
  
  
  
  
  
  
  
  
  
  <line x1="201" y1="220" x2="467" y2="90" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  
  
  
  
  
  
  
  
  
  
  
  <line x1="467" y1="220" x2="733" y2="90" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  
  
  
  
  
  
  
  
  
  
  
  <line x1="467" y1="220" x2="999" y2="90" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  
  
  
  
  
  
  
  
  
  
  
  <line x1="201" y1="410" x2="467" y2="280" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  
  
  
  
  
  
  
  
  
  
  
  <line x1="467" y1="410" x2="733" y2="280" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  
  
  
  
  
  
  
  
  
  
  
  <line x1="201" y1="410" x2="999" y2="280" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  
</svg>