<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <style>
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
  </style>

  <rect width="1200" height="675" fill="#ffffff"/>

  <!-- Background pattern (per-article variation) -->
  <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="1" fill="#2563eb" opacity="0.06"/></pattern><rect width="1200" height="675" fill="url(#dots)"/>

  <!-- Subtle top accent bar -->
  <rect width="1200" height="4" fill="#2563eb"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#1e293b">Cloud dependency vs. offline reliability for health data</text>

  <!-- Divider -->
  <line x1="600" y1="80" x2="600" y2="635" stroke="#2563eb" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- VS badge -->
  <circle cx="600" cy="110" r="22" fill="#2563eb"/>
  <text x="600" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">VS</text>

  <!-- Before panel -->
  <rect x="40" y="80" width="520" height="555" rx="12" fill="#dc2626" opacity="0.06"/>
  <rect x="40" y="80" width="520" height="555" rx="12" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.4"/>
  <text x="290" y="120" text-anchor="middle" font-size="20" font-weight="700" fill="#dc2626">Cloud-Based Tracker</text>

  
  
  <circle cx="78" cy="156" r="6" fill="#dc2626" opacity="0.6"/>
  <foreignObject x="96" y="142" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">Requires internet to view history</p>
  </foreignObject>
  
  
  <circle cx="78" cy="212" r="6" fill="#dc2626" opacity="0.6"/>
  <foreignObject x="96" y="198" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">Data stored on company servers</p>
  </foreignObject>
  
  
  <circle cx="78" cy="268" r="6" fill="#dc2626" opacity="0.6"/>
  <foreignObject x="96" y="254" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">Monthly subscription fee</p>
  </foreignObject>
  
  
  <circle cx="78" cy="324" r="6" fill="#dc2626" opacity="0.6"/>
  <foreignObject x="96" y="310" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">Doctor asks: &#34;What medications are you on?&#34;</p>
  </foreignObject>
  
  
  <circle cx="78" cy="380" r="6" fill="#dc2626" opacity="0.6"/>
  <foreignObject x="96" y="366" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">You: &#34;Let me see if I can get a signal...&#34;</p>
  </foreignObject>
  

  <!-- After panel -->
  <rect x="640" y="80" width="520" height="555" rx="12" fill="#16a34a" opacity="0.06"/>
  <rect x="640" y="80" width="520" height="555" rx="12" fill="none" stroke="#16a34a" stroke-width="1.5" opacity="0.4"/>
  <text x="900" y="120" text-anchor="middle" font-size="20" font-weight="700" fill="#16a34a">Offline-First Tracker</text>

  
  
  <circle cx="678" cy="156" r="6" fill="#16a34a" opacity="0.6"/>
  <foreignObject x="696" y="142" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">Full history accessible anywhere</p>
  </foreignObject>
  
  
  <circle cx="678" cy="212" r="6" fill="#16a34a" opacity="0.6"/>
  <foreignObject x="696" y="198" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">Data encrypted on your device</p>
  </foreignObject>
  
  
  <circle cx="678" cy="268" r="6" fill="#16a34a" opacity="0.6"/>
  <foreignObject x="696" y="254" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">One-time purchase</p>
  </foreignObject>
  
  
  <circle cx="678" cy="324" r="6" fill="#16a34a" opacity="0.6"/>
  <foreignObject x="696" y="310" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">Doctor asks: &#34;What medications are you on?&#34;</p>
  </foreignObject>
  
  
  <circle cx="678" cy="380" r="6" fill="#16a34a" opacity="0.6"/>
  <foreignObject x="696" y="366" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">You: Hand them a clear</p>
  </foreignObject>
  
  
  <circle cx="678" cy="436" r="6" fill="#16a34a" opacity="0.6"/>
  <foreignObject x="696" y="422" width="444" height="46">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13px;color:#1e293b;margin:0;line-height:1.45;">printed PDF report</p>
  </foreignObject>
  

  <!-- Source attribution -->
  <text x="1190" y="665" text-anchor="end" font-size="10" fill="#cbd5e1">stillwareltd.com</text>
