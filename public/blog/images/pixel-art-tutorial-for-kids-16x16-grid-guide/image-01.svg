  <line x1="901" y1="153" x2="901" y2="180" stroke="#2563eb" stroke-width="2"/>

  <!-- Step box -->
  <rect x="819" y="180" width="165" height="155" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="819" y="180" width="165" height="4" rx="2" fill="#2563eb"/>
  <text x="901" y="216" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Adjust Speed</text>

  <!-- Description -->
  <foreignObject x="829" y="224" width="145" height="100">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:11.5px;color:#64748b;margin:0;line-height:1.4;text-align:center;">Change frame duration to control the animation pace]</p>
  </foreignObject>

  <!-- Arrow to next step -->
  
  

