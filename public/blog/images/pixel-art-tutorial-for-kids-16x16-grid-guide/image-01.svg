





<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 390" width="1200" height="390">
  <style>
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
  </style>

  <rect width="1200" height="390" fill="#ffffff"/>

  <!-- Background pattern (per-article variation) -->
  <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="1" fill="#2563eb" opacity="0.06"/></pattern><rect width="1200" height="675" fill="url(#dots)"/>

  <!-- Subtle top accent bar -->
  <rect width="1200" height="4" fill="#2563eb"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#1e293b">The four-step animation loop for a pixel art sprite</text>

  <!-- Step accent colors (theme-aware with alternation) -->
  

  
  
  
  

  <!-- Step circle -->
  <circle cx="298" cy="125" r="28" fill="#2563eb"/>
  <circle cx="298" cy="125" r="28" fill="none" stroke="#2563eb" stroke-width="3" opacity="0.25"/>
  <text x="298" y="133" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">1</text>

  <!-- Connector line from circle to box -->
  <line x1="298" y1="153" x2="298" y2="180" stroke="#2563eb" stroke-width="2"/>

  <!-- Step box -->
  <rect x="216" y="180" width="165" height="155" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="216" y="180" width="165" height="4" rx="2" fill="#2563eb"/>
  <text x="298" y="216" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Draw Base Frame</text>

  <!-- Description -->
  <foreignObject x="226" y="224" width="145" height="100">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:11.5px;color:#64748b;margin:0;line-height:1.4;text-align:center;">Create your first sprite on a 16x16 grid</p>
  </foreignObject>

  <!-- Arrow to next step -->
  
  
  <line x1="385" y1="257" x2="409" y2="257" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="409,252 418,257 409,262" fill="#cbd5e1"/>
  
  
  
  
  

  <!-- Step circle -->
  <circle cx="499" cy="125" r="28" fill="#60a5fa"/>
  <circle cx="499" cy="125" r="28" fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.25"/>
  <text x="499" y="133" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">2</text>

  <!-- Connector line from circle to box -->
  <line x1="499" y1="153" x2="499" y2="180" stroke="#60a5fa" stroke-width="2"/>

  <!-- Step box -->
  <rect x="417" y="180" width="165" height="155" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="417" y="180" width="165" height="4" rx="2" fill="#60a5fa"/>
  <text x="499" y="216" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Duplicate &amp; Modify</text>

  <!-- Description -->
  <foreignObject x="427" y="224" width="145" height="100">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:11.5px;color:#64748b;margin:0;line-height:1.4;text-align:center;">Copy the frame and alter pixels for movement</p>
  </foreignObject>

  <!-- Arrow to next step -->
  
  
  <line x1="586" y1="257" x2="610" y2="257" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="610,252 619,257 610,262" fill="#cbd5e1"/>
  
  
  
  
  

  <!-- Step circle -->
  <circle cx="700" cy="125" r="28" fill="#0891b2"/>
  <circle cx="700" cy="125" r="28" fill="none" stroke="#0891b2" stroke-width="3" opacity="0.25"/>
  <text x="700" y="133" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">3</text>

