  <rect x="618" y="180" width="165" height="155" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="618" y="180" width="165" height="4" rx="2" fill="#0891b2"/>
  <text x="700" y="216" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Test Timing</text>

  <!-- Description -->
  <foreignObject x="628" y="224" width="145" height="100">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:11.5px;color:#64748b;margin:0;line-height:1.4;text-align:center;">Flip between frames to see the motion</p>
  </foreignObject>

  <!-- Arrow to next step -->
  
  
  <line x1="787" y1="257" x2="811" y2="257" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="811,252 820,257 811,262" fill="#cbd5e1"/>
  
  
  
  
  

  <!-- Step circle -->
  <circle cx="901" cy="125" r="28" fill="#2563eb"/>
  <circle cx="901" cy="125" r="28" fill="none" stroke="#2563eb" stroke-width="3" opacity="0.25"/>
  <text x="901" y="133" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">4</text>

