<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <style>
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
  </style>

  <rect width="1200" height="675" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#1e293b">The mental model shift: from tenant to owner</text>

  <!-- Divider -->
  <line x1="600" y1="80" x2="600" y2="640" stroke="#2563eb" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- VS badge -->
  <circle cx="600" cy="110" r="20" fill="#2563eb"/>
  <text x="600" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">VS</text>

  <!-- Before panel -->
  <rect x="40" y="80" width="520" height="560" rx="14" fill="#fee2e2" opacity="0.25"/>
  <rect x="40" y="80" width="520" height="560" rx="14" fill="none" stroke="#fca5a5" stroke-width="1"/>
  <text x="300" y="120" text-anchor="middle" font-size="22" font-weight="700" fill="#dc2626">Tenant Mindset</text>

  
  
  <circle cx="80" cy="158" r="7" fill="#dc2626" opacity="0.7"/>
  <foreignObject x="98" y="143" width="440" height="48">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#1e293b;margin:0;line-height:1.45;">Relies on cloud service provider</p>
  </foreignObject>
  
  
  <circle cx="80" cy="216" r="7" fill="#dc2626" opacity="0.7"/>
  <foreignObject x="98" y="201" width="440" height="48">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#1e293b;margin:0;line-height:1.45;">Fears downtime and outages</p>
  </foreignObject>
  
  
  <circle cx="80" cy="274" r="7" fill="#dc2626" opacity="0.7"/>
  <foreignObject x="98" y="259" width="440" height="48">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#1e293b;margin:0;line-height:1.45;">Accepts data mining as trade-off</p>
  </foreignObject>
  
  
  <circle cx="80" cy="332" r="7" fill="#dc2626" opacity="0.7"/>
  <foreignObject x="98" y="317" width="440" height="48">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#1e293b;margin:0;line-height:1.45;">No control over data format</p>
  </foreignObject>
  
  
  <circle cx="80" cy="390" r="7" fill="#dc2626" opacity="0.7"/>
  <foreignObject x="98" y="375" width="440" height="48">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#1e293b;margin:0;line-height:1.45;">Monthly subscription required</p>
  </foreignObject>
  

  <!-- After panel -->
  <rect x="640" y="80" width="520" height="560" rx="14" fill="#dcfce7" opacity="0.25"/>
  <rect x="640" y="80" width="520" height="560" rx="14" fill="none" stroke="#86efac" stroke-width="1"/>
  <text x="900" y="120" text-anchor="middle" font-size="22" font-weight="700" fill="#16a34a">Owner Mindset</text>

  
  
  <circle cx="680" cy="158" r="7" fill="#16a34a" opacity="0.7"/>
  <foreignObject x="698" y="143" width="440" height="48">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#1e293b;margin:0;line-height:1.45;">Manages data on local device</p>
  </foreignObject>
  
  
  <circle cx="680" cy="216" r="7" fill="#16a34a" opacity="0.7"/>
  <foreignObject x="698" y="201" width="440" height="48">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#1e293b;margin:0;line-height:1.45;">Has constant offline access</p>
  </foreignObject>
  
  
  <circle cx="680" cy="274" r="7" fill="#16a34a" opacity="0.7"/>
  <foreignObject x="698" y="259" width="440" height="48">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#1e293b;margin:0;line-height:1.45;">Holds all encryption keys</p>
  </foreignObject>
  
  
  <circle cx="680" cy="332" r="7" fill="#16a34a" opacity="0.7"/>
  <foreignObject x="698" y="317" width="440" height="48">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#1e293b;margin:0;line-height:1.45;">Data stored in open formats</p>
  </foreignObject>
  
  
  <circle cx="680" cy="390" r="7" fill="#16a34a" opacity="0.7"/>
  <foreignObject x="698" y="375" width="440" height="48">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#1e293b;margin:0;line-height:1.45;">One-time purchase, no lock-in</p>
  </foreignObject>
  
</svg>