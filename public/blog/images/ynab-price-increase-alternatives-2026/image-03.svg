<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <style>
    text { font-family: Inter, system-ui, -apple-system, sans-serif; }
  </style>

  <rect width="1200" height="675" fill="#ffffff"/>

  <!-- Background pattern (per-article variation) -->
  <rect width="1200" height="6" fill="#2563eb"/><rect y="6" width="1200" height="2" fill="#60a5fa" opacity="0.4"/>

  <!-- Subtle top accent bar -->
  <rect width="1200" height="4" fill="#059669"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-size="26" font-weight="700" fill="#1e293b">Choosing Your Post-YNAB Budgeting Path</text>

  
  

  
  
  

  <!-- Question node -->
  
  <rect x="450" y="72" width="300" height="76" rx="12" fill="#dbeafe" stroke="#059669" stroke-width="2"/>
  <foreignObject x="464" y="80" width="272" height="60">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13.5px;color:#1e293b;margin:0;line-height:1.35;text-align:center;font-weight:600;">Need automated bank sync</p>
  </foreignObject>

  <!-- Yes path (left) -->
  
  <line x1="450" y1="110" x2="550" y2="110" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="270" y="78" width="260" height="64" rx="10" fill="#16a34a" fill-opacity="0.1" stroke="#16a34a" stroke-width="1.5"/>
  <text x="282" y="98" font-size="11" font-weight="700" fill="#16a34a">YES</text>
  <foreignObject x="282" y="100" width="236" height="38">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:12px;color:#374151;margin:0;line-height:1.3;">Stick with YNAB</p>
  </foreignObject>

  <!-- No path (right) -->
  
  <line x1="750" y1="110" x2="800" y2="110" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="780" y="78" width="260" height="64" rx="10" fill="#dc2626" fill-opacity="0.1" stroke="#dc2626" stroke-width="1.5"/>
  <text x="792" y="98" font-size="11" font-weight="700" fill="#dc2626">NO</text>
  <foreignObject x="792" y="100" width="236" height="38">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:12px;color:#374151;margin:0;line-height:1.3;"></p>
  </foreignObject>

  <!-- Vertical connector to next question -->
  
  <line x1="600" y1="148" x2="600" y2="222" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="596,218 600,222 604,218" fill="#64748b"/>
  
  
  
  

  <!-- Question node -->
  
  <rect x="450" y="222" width="300" height="76" rx="12" fill="#dbeafe" stroke="#059669" stroke-width="2"/>
  <foreignObject x="464" y="230" width="272" height="60">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13.5px;color:#1e293b;margin:0;line-height:1.35;text-align:center;font-weight:600;">or Copilot|Prefer manual entry/own your data</p>
  </foreignObject>

  <!-- Yes path (left) -->
  
  <line x1="450" y1="260" x2="550" y2="260" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="270" y="228" width="260" height="64" rx="10" fill="#16a34a" fill-opacity="0.1" stroke="#16a34a" stroke-width="1.5"/>
  <text x="282" y="248" font-size="11" font-weight="700" fill="#16a34a">YES</text>
  <foreignObject x="282" y="250" width="236" height="38">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:12px;color:#374151;margin:0;line-height:1.3;"></p>
  </foreignObject>

  <!-- No path (right) -->
  
  <line x1="750" y1="260" x2="800" y2="260" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="780" y="228" width="260" height="64" rx="10" fill="#dc2626" fill-opacity="0.1" stroke="#dc2626" stroke-width="1.5"/>
  <text x="792" y="248" font-size="11" font-weight="700" fill="#dc2626">NO</text>
  <foreignObject x="792" y="250" width="236" height="38">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:12px;color:#374151;margin:0;line-height:1.3;"></p>
  </foreignObject>

  <!-- Vertical connector to next question -->
  
  <line x1="600" y1="298" x2="600" y2="372" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="596,368 600,372 604,368" fill="#64748b"/>
  
  
  
  

  <!-- Question node -->
  
  <rect x="450" y="372" width="300" height="76" rx="12" fill="#dbeafe" stroke="#059669" stroke-width="2"/>
  <foreignObject x="464" y="380" width="272" height="60">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13.5px;color:#1e293b;margin:0;line-height:1.35;text-align:center;font-weight:600;">Willing to pay annually for updates</p>
  </foreignObject>

  <!-- Yes path (left) -->
  
  <line x1="450" y1="410" x2="550" y2="410" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="270" y="378" width="260" height="64" rx="10" fill="#16a34a" fill-opacity="0.1" stroke="#16a34a" stroke-width="1.5"/>
  <text x="282" y="398" font-size="11" font-weight="700" fill="#16a34a">YES</text>
  <foreignObject x="282" y="400" width="236" height="38">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:12px;color:#374151;margin:0;line-height:1.3;">Consider Goodbudget Plus or EveryDollar</p>
  </foreignObject>

  <!-- No path (right) -->
  
  <line x1="750" y1="410" x2="800" y2="410" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="780" y="378" width="260" height="64" rx="10" fill="#dc2626" fill-opacity="0.1" stroke="#dc2626" stroke-width="1.5"/>
  <text x="792" y="398" font-size="11" font-weight="700" fill="#dc2626">NO</text>
  <foreignObject x="792" y="400" width="236" height="38">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:12px;color:#374151;margin:0;line-height:1.3;">Want a one-time purchase?</p>
  </foreignObject>

  <!-- Vertical connector to next question -->
  
  <line x1="600" y1="448" x2="600" y2="522" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="596,518 600,522 604,518" fill="#64748b"/>
  
  
  
  

  <!-- Question node -->
  
  <rect x="450" y="522" width="300" height="76" rx="12" fill="#dbeafe" stroke="#059669" stroke-width="2"/>
  <foreignObject x="464" y="530" width="272" height="60">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:13.5px;color:#1e293b;margin:0;line-height:1.35;text-align:center;font-weight:600;">Comfortable with local data + Google Drive sync</p>
  </foreignObject>

  <!-- Yes path (left) -->
  
  <line x1="450" y1="560" x2="550" y2="560" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="270" y="528" width="260" height="64" rx="10" fill="#16a34a" fill-opacity="0.1" stroke="#16a34a" stroke-width="1.5"/>
  <text x="282" y="548" font-size="11" font-weight="700" fill="#16a34a">YES</text>
  <foreignObject x="282" y="550" width="236" height="38">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:12px;color:#374151;margin:0;line-height:1.3;">Zeroed is your alternative</p>
  </foreignObject>

  <!-- No path (right) -->
  
  <line x1="750" y1="560" x2="800" y2="560" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="780" y="528" width="260" height="64" rx="10" fill="#dc2626" fill-opacity="0.1" stroke="#dc2626" stroke-width="1.5"/>
  <text x="792" y="548" font-size="11" font-weight="700" fill="#dc2626">NO</text>
  <foreignObject x="792" y="550" width="236" height="38">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:12px;color:#374151;margin:0;line-height:1.3;">A cloud app may still be acceptable</p>
  </foreignObject>

  <!-- Vertical connector to next question -->
  
  

  <!-- Source attribution -->
  <text x="1190" y="665" text-anchor="end" font-size="10" fill="#cbd5e1">stillwareltd.com</text>
