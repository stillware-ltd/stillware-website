  <rect x="765" y="385" width="160" height="155" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="765" y="385" width="160" height="4" rx="2" fill="#dc2626"/>
  <text x="845" y="413" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">2020</text>
  <text x="845" y="433" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Fatigue Sets In</text>

  <foreignObject x="775" y="441" width="140" height="85">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:11px;color:#64748b;margin:0;line-height:1.35;text-align:center;">Consumer pushback grows as bills stack up</p>
  </foreignObject>
  
  
  
  

  <!-- Dot -->
  <circle cx="1090" cy="330" r="10" fill="#ffffff" stroke="#16a34a" stroke-width="3"/>
  <circle cx="1090" cy="330" r="4" fill="#16a34a"/>

  <!-- Vertical connector -->
  
  <line x1="1090" y1="320" x2="1090" y2="280" stroke="#e2e8f0" stroke-width="1.5"/>
  

  <!-- Event card -->
  
  
  

  <rect x="1010" y="120" width="160" height="155" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="1010" y="120" width="160" height="4" rx="2" fill="#16a34a"/>
  <text x="1090" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">2025</text>
  <text x="1090" y="168" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">The Local-First Counter-Movement</text>

  <foreignObject x="1020" y="176" width="140" height="85">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:11px;color:#64748b;margin:0;line-height:1.35;text-align:center;">Users seek tools they can own and control offline</p>
  </foreignObject>
  

  <!-- Source attribution -->
  <text x="1190" y="665" text-anchor="end" font-size="10" fill="#cbd5e1">stillwareltd.com</text>
