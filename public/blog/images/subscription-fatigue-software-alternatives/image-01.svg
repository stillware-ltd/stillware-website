  <rect x="520" y="120" width="160" height="155" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="520" y="120" width="160" height="4" rx="2" fill="#0891b2"/>
  <text x="600" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#0891b2">2015</text>
  <text x="600" y="168" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Everything Subscribes</text>

  <foreignObject x="530" y="176" width="140" height="85">
    <p xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,system-ui,sans-serif;font-size:11px;color:#64748b;margin:0;line-height:1.35;text-align:center;">From cars to razors to software</p>
  </foreignObject>
  
  
  
  

  <!-- Dot -->
  <circle cx="845" cy="330" r="10" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
  <circle cx="845" cy="330" r="4" fill="#dc2626"/>

  <!-- Vertical connector -->
  
  <line x1="845" y1="340" x2="845" y2="380" stroke="#e2e8f0" stroke-width="1.5"/>
  

